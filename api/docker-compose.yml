services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    shm_size: "2gb"
    volumes:
      - "./cache:/cache:rw"
      - ./prism_app:/prism_app:ro
      - ./alembic.ini:/alembic.ini:ro
      - ./alembic:/alembic:ro
    environment:
      - WORKERS_PER_CORE=1
      # External services credentials
      - KOBO_USERNAME=${KOBO_USERNAME:-kobo_user}
      - KOBO_PASSWORD=${KOBO_PASSWORD:-test}
      - ACLED_API_KEY=${ACLED_API_KEY:-changeme}
      - ACLED_API_EMAIL=${ACLED_API_EMAIL:-changeme}
      - HDC_TOKEN
      # Alerts database
      - PRISM_ALERTS_DATABASE_URL
    ports:
      - "80:80"

  # Playwright worker image: map export queue, scheduled public maps cron, alert crons.
  export_map_worker:
    build:
      context: ./
      dockerfile: Dockerfile.export-map-worker
    shm_size: "2gb"
    volumes:
      - "./cache:/cache:rw"
      - ./prism_app:/prism_app:ro
    environment:
      - PRISM_ALERTS_DATABASE_URL
      - EXPORT_MAP_S3_BUCKET=${EXPORT_MAP_S3_BUCKET:-}
      - EXPORT_MAP_LOCAL_OUTPUT_DIR=${EXPORT_MAP_LOCAL_OUTPUT_DIR:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - BROWSER_POOL_SIZE=1
      - PRISM_ALERTS_EMAIL_HOST=${PRISM_ALERTS_EMAIL_HOST:-}
      - PRISM_ALERTS_EMAIL_USER=${PRISM_ALERTS_EMAIL_USER:-}
      - PRISM_ALERTS_EMAIL_PASSWORD=${PRISM_ALERTS_EMAIL_PASSWORD:-}
      - API_URL=${API_URL:-}
      - AA_ALERT_COUNTRY=${AA_ALERT_COUNTRY:-mozambique}
      - PRISM_ALERT_HTTP_VERIFY_SSL=${PRISM_ALERT_HTTP_VERIFY_SSL:-true}
    command: [ "python", "-m", "prism_app.workers.export_map_worker" ]

  # Local dev only: PostGIS for alerts DB (host port 54321). Not used in production deploy.
  alerting-db:
    image: kartoza/postgis:16-3
    restart: unless-stopped
    ports:
      - "54321:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: "!ChangeMe!"
    volumes:
      - ./alerting_db_data:/var/lib/postgresql
