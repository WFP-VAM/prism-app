services:
  api:
    build: ./
    volumes:
      - "./cache:/cache:rw"
      - ./prism_app:/usr/local/lib/python3.9/site-packages/prism_app:ro
    environment:
      - WORKERS_PER_CORE=1
      # External services credentials
      - KOBO_USERNAME=${KOBO_USERNAME:-kobo_user}
      - KOBO_PASSWORD=${KOBO_PASSWORD:-test}
      - ACLED_API_KEY=${ACLED_API_KEY:-changeme}
      - ACLED_API_EMAIL=${ACLED_API_EMAIL:-changeme}
      - HDC_TOKEN
      # Alerts database
      - PRISM_ALERTS_DATABASE_URL
    ports:
      - "80:80"

  # Batch map export consumer (Playwright + SQS). Same image as api; separate cgroup limits in deploy if needed.
  export_map_worker:
    build: ./
    shm_size: "2gb"
    volumes:
      - "./cache:/cache:rw"
      - ./prism_app:/usr/local/lib/python3.9/site-packages/prism_app:ro
    environment:
      - KOBO_USERNAME=${KOBO_USERNAME:-kobo_user}
      - KOBO_PASSWORD=${KOBO_PASSWORD:-test}
      - PRISM_ALERTS_DATABASE_URL
      - EXPORT_JOB_QUEUE_URL=${EXPORT_JOB_QUEUE_URL:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - BROWSER_POOL_SIZE=1
    command: python -m prism_app.worker.export_map_worker
