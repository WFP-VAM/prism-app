{% extends "access_pages_base.html" %}
{% set title = "Sign out" %}
{% set heading = "Confirm sign out" %}

{% block content %}
<p>
    Use the button below to end your PRISM admin session (clear cookies).
</p>
<form method="post" action="/auth/sign-out">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
    <button type="submit" class="btn btn-outline-secondary">Sign out</button>
</form>
{% endblock %}
