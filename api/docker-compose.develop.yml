services:
  db:
    image: kartoza/postgis:16-3
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=!ChangeMe!
    ports:
      - "54321:5432"
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  # Local S3-compatible storage for map export artifacts (dev only).
  rustfs:
    image: rustfs/rustfs:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
    volumes:
      - rustfs_data:/data
    command: ["/data"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s

  rustfs-init:
    image: amazon/aws-cli:2.27.50
    depends_on:
      rustfs:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: rustfsadmin
      AWS_SECRET_ACCESS_KEY: rustfsadmin
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: /bin/sh
    command:
      - -c
      - |
        until aws --endpoint-url http://rustfs:9000 s3 ls >/dev/null 2>&1; do
          echo "waiting for rustfs..."
          sleep 2
        done
        aws --endpoint-url http://rustfs:9000 s3 mb s3://prism-dev 2>/dev/null || true

  api:
    env_file:
      - path: .env
        required: false
    depends_on:
      db:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
    volumes:
      - ./prism_app:/prism_app
      - ./pyproject.toml:/pyproject.toml
      - ./poetry.lock:/poetry.lock
      - ./alembic.ini:/alembic.ini:ro
      - ./alembic:/alembic:ro
      - ./scripts:/scripts:ro
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - "RUN=uvicorn prism_app.main:app --host 0.0.0.0 --port 80"
      # Override host .env (127.0.0.1:54321) with Docker network hostname for api + alert workers.
      - PRISM_ALERTS_DATABASE_URL=postgresql://postgres:!ChangeMe!@db:5432/postgres
      - POSTGRES_HOST=db
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_PASSWORD=!ChangeMe!
      - KOBO_PASSWORD=${KOBO_PASSWORD:?"Add a password to access KOBO data."}
      - KOBO_USERNAME=${KOBO_USERNAME:?"Add a user to access KOBO data."}
      - STAC_AWS_ACCESS_KEY_ID=${STAC_AWS_ACCESS_KEY_ID}
      - STAC_AWS_SECRET_ACCESS_KEY=${STAC_AWS_SECRET_ACCESS_KEY}
      - GOOGLE_FLOODS_API_KEY=${GOOGLE_FLOODS_API_KEY}
      - VECTOR_STORE_ACCESS_KEY_ID=${VECTOR_STORE_ACCESS_KEY_ID}
      - VECTOR_STORE_SECRET_ACCESS_KEY=${VECTOR_STORE_SECRET_ACCESS_KEY}
      - VECTOR_STORE_DEFAULT_REGION=${VECTOR_STORE_DEFAULT_REGION}
      # Map export artifacts → local RustFS
      - EXPORT_MAP_S3_BUCKET=prism-dev
      - EXPORT_MAP_LOCAL_OUTPUT_DIR=
      - AWS_ACCESS_KEY_ID=rustfsadmin
      - AWS_SECRET_ACCESS_KEY=rustfsadmin
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://rustfs:9000
      - AWS_PRESIGN_ENDPOINT_URL=http://localhost:9000
    command: uvicorn prism_app.main:app --host 0.0.0.0 --port 80 --reload
    # Infinite loop, to keep it alive, for debugging
    # command: bash -c "while true; do echo 'sleeping...' && sleep 10; done"

  export_map_worker:
    shm_size: "2gb"
    depends_on:
      db:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
    volumes:
      - ./prism_app:/prism_app
    build:
      context: ./
      dockerfile: ./Dockerfile.export-map-worker
    environment:
      - PRISM_ALERTS_DATABASE_URL=postgresql://postgres:!ChangeMe!@db:5432/postgres
      - EXPORT_MAP_S3_BUCKET=prism-dev
      - EXPORT_MAP_LOCAL_OUTPUT_DIR=
      - AWS_ACCESS_KEY_ID=rustfsadmin
      - AWS_SECRET_ACCESS_KEY=rustfsadmin
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://rustfs:9000
      - AWS_PRESIGN_ENDPOINT_URL=http://localhost:9000
      - BROWSER_POOL_SIZE=1
    working_dir: /prism_app
    command: [ "python", "-m", "prism_app.workers.export_map_worker" ]

volumes:
  db_data:
  rustfs_data:
