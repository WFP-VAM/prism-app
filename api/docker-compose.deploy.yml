networks:
  traefik_default:
    external: true

services:
  traefik:
    # https://doc.traefik.io/traefik/migration/v2-to-v3/
    image: "traefik:v3.7.0"
    container_name: "traefik"
    command:
      - "--log.level=INFO"
      # Keep Docker label rules compatible with v2 matchers (Host, PathPrefix, ...).
      - "--core.defaultrulesyntax=v2"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.network=traefik_default"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      # Production Let's Encrypt (default CA). For staging debugging only, add:
      #   --certificatesresolvers.myresolver.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory
      # Switching staging→prod: if issuance fails, stop Traefik and rotate/rename letsencrypt/acme.json (different ACME accounts).
      - "--certificatesresolvers.myresolver.acme.email=${INFO_EMAIL:?'Must provide info email'}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    networks:
      - traefik_default
    ports:
      - "443:443"
      - "8080:8080"
    volumes:
      - "./letsencrypt:/letsencrypt"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    restart: unless-stopped

  api:
    container_name: "api"
    shm_size: "2gb"
    networks:
      - traefik_default
      - default
    ports:
      - "80:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`${HOSTNAME:?'Must provide hostname'}`)"
      - "traefik.http.routers.whoami.entrypoints=websecure"
      - "traefik.http.routers.whoami.tls.certresolver=myresolver"
    environment:
      - "RUN=uvicorn prism_app.main:app --host 0.0.0.0 --port 80 --proxy-headers --forwarded-allow-ips=172.16.0.0/12,10.0.0.0/8,192.168.0.0/16,127.0.0.1"
      - BROWSER_POOL_SIZE=4
      # make sure that the alert password is properly set
      - PRISM_ALERTS_DATABASE_URL=${PRISM_ALERTS_DATABASE_URL:?"Provide a URL for the alerts database."}
      - KOBO_PASSWORD=${KOBO_PASSWORD:?"Add a password to access KOBO data."}
      - KOBO_USERNAME=${KOBO_USERNAME:?"Add a user to access KOBO data."}
      - HDC_TOKEN=${HDC_TOKEN:?"Provide a token to access HDC chart data."}
      - STAC_AWS_ACCESS_KEY_ID=${STAC_AWS_ACCESS_KEY_ID:?"Provide the AWS access key for the stac api."}
      - STAC_AWS_SECRET_ACCESS_KEY=${STAC_AWS_SECRET_ACCESS_KEY:?"Provide the AWS secret key for the stac api."}
      - GOOGLE_FLOODS_API_KEY=${GOOGLE_FLOODS_API_KEY:?"Provide the Google Floods API key."}
      - VECTOR_STORE_ACCESS_KEY_ID=${VECTOR_STORE_ACCESS_KEY_ID}
      - VECTOR_STORE_SECRET_ACCESS_KEY=${VECTOR_STORE_SECRET_ACCESS_KEY}
      - VECTOR_STORE_DEFAULT_REGION=${VECTOR_STORE_DEFAULT_REGION}
      - PRISM_OIDC_ISSUER=${PRISM_OIDC_ISSUER:?"Provide the CIAM OIDC issuer URL."}
      - PRISM_OIDC_REDIRECT_URI=${PRISM_OIDC_REDIRECT_URI:?"Provide the OIDC redirect URI."}
      - PRISM_OIDC_CLIENT_ID=${PRISM_OIDC_CLIENT_ID:?"Provide the CIAM OIDC client ID."}
      - PRISM_OIDC_CLIENT_SECRET=${PRISM_OIDC_CLIENT_SECRET:?"Provide the CIAM OIDC client secret."}
      - PRISM_SESSION_SECRET=${PRISM_SESSION_SECRET:?"Provide the session signing secret."}
      - PRISM_SESSION_TTL_SECONDS=${PRISM_SESSION_TTL_SECONDS:-604800}
      - PRISM_ENV=${PRISM_ENV:-development}
    command:
      - uvicorn
      - prism_app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "80"
      - --proxy-headers
      - --forwarded-allow-ips=172.16.0.0/12,10.0.0.0/8,192.168.0.0/16,127.0.0.1
    restart: always
    # adding a DNS to allow self lookup of the api
    dns:
      - 8.8.8.8

  export_map_worker:
    build:
      context: .
      dockerfile: Dockerfile.export-map-worker
    shm_size: "2gb"
    networks:
      - traefik_default
      - default
    environment:
      - BROWSER_POOL_SIZE=2
      - PRISM_ALERTS_DATABASE_URL=${PRISM_ALERTS_DATABASE_URL:?"Provide a URL for the alerts database."}
      # Default URI must stay aligned with DEFAULT_EXPORT_MAP_S3_BUCKET in export_s3.py
      - EXPORT_MAP_S3_BUCKET=${EXPORT_MAP_S3_BUCKET:-s3://prism-wfp/batch-maps}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-${VECTOR_STORE_DEFAULT_REGION:-}}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
    command:
      - python
      - -m
      - prism_app.worker.export_map_worker
    restart: always
    dns:
      - 8.8.8.8
