name: PRISM CI - Alerting
on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ensure cron scripts are executable
        run: |
          cd alerting
          for f in crons/cron_*.sh; do
            if [ ! -x "$f" ]; then
              echo "$f is not executable (missing chmod +x)"
              exit 1
            fi
          done

      - name: Install (script aliases only)
        run: |
          cd alerting
          yarn install --frozen-lockfile

      - name: Security audit
        run: cd alerting && yarn run audit
