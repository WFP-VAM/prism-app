# for comment on PR, follow instruction for: https://github.com/marketplace/actions/sticky-pull-request-comment
name: PRISM CI - API
on:
  # Run on all pull requests and on pushes to master.
  pull_request:
  push:
    branches:
      - master

jobs:
  api_lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
      # run the matrix jobs one after the other, so they can benefit from caching
      max-parallel: 1

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          # Version of Poetry to use
          version: 2.2.1
          virtualenvs-create: true
          virtualenvs-in-project: true
      - name: Install dependencies
        run: |
          cd api
          poetry install
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      - name: Upgrade pip (CVE-2026-1703)
        run: |
          cd api
          poetry run pip install --upgrade 'pip>=26.0'
      - name: Check formatting with black and isort
        run: |
          cd api
          poetry run black --check .
          poetry run isort --check .
      - name: Security audit
        run: |
          cd api
          poetry run pip-audit --desc --format json > audit_results.json 2>/dev/null || true
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          data = json.loads(Path("audit_results.json").read_text() or "{}")
          vulnerable_dependencies = [
              dependency
              for dependency in data.get("dependencies", [])
              if dependency.get("vulns")
          ]

          if not vulnerable_dependencies:
              print("✅ No vulnerabilities found")
              sys.exit(0)

          print(
              f"❌ Found vulnerable packages: {len(vulnerable_dependencies)}"
          )
          for dependency in vulnerable_dependencies:
              advisory_ids = sorted(
                  {
                      advisory
                      for vuln in dependency["vulns"]
                      for advisory in [vuln.get("id"), *(vuln.get("aliases") or [])]
                      if advisory
                  }
              )
              fixed_versions = sorted(
                  {
                      version
                      for vuln in dependency["vulns"]
                      for version in (vuln.get("fix_versions") or [])
                      if version
                  }
              )
              print(
                  f"- {dependency['name']}@{dependency['version']} | "
                  f"{', '.join(advisory_ids)} | "
                  f"fix: {', '.join(fixed_versions) or 'none listed'}"
              )

          sys.exit(1)
          PY

  api_build:
    name: build and test api
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Docker Compose
        run: |
          DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
          mkdir -p $DOCKER_CONFIG/cli-plugins
          curl -SL https://github.com/docker/compose/releases/download/v2.20.3/docker-compose-`uname -s`-`uname -m` -o $DOCKER_CONFIG/cli-plugins/docker-compose
          chmod +x $DOCKER_CONFIG/cli-plugins/docker-compose
          docker compose version
      - name: Build containers
        run: cd api && make build
      - name: Run tests
        run: cd api && make api-test
